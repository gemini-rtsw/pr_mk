variables:
  GIT_STRATEGY: clone
  TOKEN: "***REMOVED-GITLAB-TOKEN***"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  PACKAGE_NAME: ${CI_PROJECT_NAME}

services:
  - docker:dind

.docker-login: &docker_login
  before_script:
    - docker login -u oauth2 -p ${TOKEN} ${CI_REGISTRY}

build:
  image: docker:latest
  stage: build
  <<: *docker_login
  script:
    # Pull the container
    - docker pull registry.gitlab.com/nsf-noirlab/gemini/rtsw/gemini-rtsw-repo/rocky8-packages:latest
    
    # Create rpms directory for artifacts
    - mkdir -p rpms
    
    # Debug: Show current directory and contents
    - pwd
    - ls -la
    
    # Install bash so we can run the script
    - apk add --no-cache bash
    
    # Run build_rpm.sh
    - chmod +x build_rpm.sh
    - ./build_rpm.sh
    
    # Install required tools
    - apk add --no-cache curl git
    
    # Configure git for uploads
    - git config --global credential.helper store
    - echo "https://oauth2:${TOKEN}@gitlab.com" > ~/.git-credentials
    - git config --global user.email "ci-pipeline@noreply.gitlab.com"
    - git config --global user.name "GitLab CI"
    
    # Clone repo and upload RPMs
    - git clone https://gitlab.com/nsf-noirlab/gemini/rtsw/gemini-rtsw-repo.git
    - cd gemini-rtsw-repo
    - |
      for rpm in ../rpms/*.rpm; do
        if [ "$rpm" = "$(ls -t ../rpms/*.rpm | head -1)" ]; then
          ./upload_rpm.sh "$rpm"
        else
          ./upload_rpm.sh --no-push "$rpm"
        fi
      done
    - cd ..

    # Upload RPMs to GitLab package registry
    - |
      for rpm in rpms/*.rpm; do
        echo "Uploading $rpm..."
        curl --header "PRIVATE-TOKEN: ${REGISTRY_TOKEN}" \
          --upload-file "$rpm" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/rpm-repo/1.0/$(basename $rpm)"
        echo "Upload complete: $rpm"
      done

  artifacts:
    paths:
      - rpms/*.rpm

docker-build:
  image: docker:latest
  stage: deploy
  needs: ["build"]
  <<: *docker_login
  script:
    # Install required tools
    - apk add --no-cache bash git
    
    # Run the docker build script
    - chmod +x build_docker.sh
    - ./build_docker.sh 